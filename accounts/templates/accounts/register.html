<!DOCTYPE html>
<html>
<head>
    <title>Daftar Account</title>
</head>
<body>

<div class="login-container">

    <h2>Buat Account Baru</h2>

    {% if error %}
        <p style="color:red">
            {{ error }}
        </p>
    {% endif %}

    <form method="POST">

        {% csrf_token %}

        <input
            type="text"
            name="username"
            placeholder="Username"
            required>

        <br><br>

        <input
            type="password"
            name="password"
            placeholder="Password"
            required>

        <br><br>

        <button type="submit">
            Daftar
        </button>

    </form>

    <br>

    <a href="{% url 'login' %}">
        Sudah punya akun? Login
    </a>

</div>

</body>
</html>
