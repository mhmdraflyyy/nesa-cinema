<!DOCTYPE html>
<html>
<head>
    <title>Login NESA Cinema</title>
</head>
<body>

<h2>Login</h2>

{% if error %}
<p>{{ error }}</p>
{% endif %}

<form method="POST">
    {% csrf_token %}

    <input
        type="text"
        name="username"
        placeholder="Username"
        required>

    <br><br>

    <input
        type="password"
        name="password"
        placeholder="Password"
        required>

    <br><br>

    <button type="submit">
        Login
    </button>

</form>

</body>
</html>
